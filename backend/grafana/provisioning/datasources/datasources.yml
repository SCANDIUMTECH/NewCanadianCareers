apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: db:5432
    database: ${DB_NAME:-orion}
    user: ${DB_USER:-orion}
    password: ${DB_PASSWORD}
    isDefault: true
    jsonData:
      sslmode: disable
    editable: true

  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis:6379
    jsonData:
      client: direct
      poolSize: 10
      sentinelMaster: ""
      tlsSkipVerify: true
    secureJsonData:
      password: ${REDIS_PASSWORD}
    editable: true

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: false
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      defaultDatabase: ${CLICKHOUSE_DB:-default}
      username: ${CLICKHOUSE_USER:-orion}
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
    editable: true
