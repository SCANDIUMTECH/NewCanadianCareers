# Traefik Static Configuration
api:
  dashboard: true
  insecure: true  # Accessed only via 127.0.0.1:8080 — safe behind localhost binding

log:
  level: INFO

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls: {}
    transport:
      respondingTimeouts:
        readTimeout: 120s
        writeTimeout: 120s
        idleTimeout: 120s

providers:
  docker:
    exposedByDefault: false
    network: frontend_net
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Health check endpoint
ping:
  entryPoint: web
