# ==============================================================
# RabbitMQ 4.2 Configuration — Orion Platform
# ==============================================================
# Mounted read-only into the container via docker-compose.
# Docs: https://www.rabbitmq.com/docs/configure
# ==============================================================

# ============ Authentication & Access Control ============
# Disable guest user on all interfaces (not just loopback)
loopback_users = none

# Default user/vhost created by RABBITMQ_DEFAULT_USER/PASS env vars
# in docker-compose — no additional users configured here.

# ============ Resource Limits ============
# Memory watermark — broker pauses publishers when memory exceeds 60% of container limit
vm_memory_high_watermark.relative = 0.6

# Disk free space alarm — stops accepting messages below 500MB free
disk_free_limit.absolute = 500MB

# Max channels per connection (prevent resource exhaustion)
channel_max = 128

# Max message size — 16MB (prevents oversized payloads)
max_message_size = 16777216

# ============ Connection Limits ============
# TCP connection timeout for AMQP handshake
handshake_timeout = 10000

# Heartbeat interval — detect dead connections (seconds)
heartbeat = 60

# ============ Queue Defaults ============
# RabbitMQ 4.x defaults to quorum queues — no override needed.
# Quorum queues: replicated, durable, Raft-consensus.
# Default redelivery limit is 20 (messages redelivered >20 times are dead-lettered/dropped).

# Consumer timeout — disconnect idle consumers after 30 minutes
consumer_timeout = 1800000

# ============ Deprecated Feature Flags (4.x) ============
# global_qos: removed in 4.x — use per-consumer QoS (Celery's default)
deprecated_features.permit.global_qos = false
# transient_nonexcl_queues: still needed by Celery's kombu library (permitted by default in 4.2,
# will be removed in a future major version — monitor Celery releases for kombu migration)

# ============ Management Plugin ============
# Rate mode for statistics (basic = lower overhead)
management.rates_mode = basic

# Session timeout for management UI (15 minutes)
management.login_session_timeout = 15

# ============ Logging ============
# Log level — warning for production, info/debug for troubleshooting
log.console = true
log.console.level = warning
log.file = false

# ============ Security Headers ============
# CORS — restrict management API to localhost only
management.cors.allow_origins.1 = http://localhost:15672
